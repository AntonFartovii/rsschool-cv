<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="./style/reset.css">
    <link rel="stylesheet" href="./style/style.css">
    <style></style>
    <title>Popup</title>
</head>
<body>
    <div class="popup ">
            <div class="popup-title">
                Log in to your account
            </div>
            <div class="auth-fb">
                <a>
                    <img src="assets/svg/fb.svg"/>
                    Sign In with Facebook
                </a>
            </div>
            <div class="auth-google">
                <a>
                    <img src="assets/svg/google.svg"/>
                    Sign In with Google
                </a>
            </div>
            <hr class="main"/>
            <label for="email">E-mail</label>
            <input id="email" class="input">
            <label for="pass">Password</label>
            <input id="pass" class="input">
            <button class="btn btn-popup">Sign In</button>
            <div class="link-auth">
                <a>Forgot Your Password?</a>
                <hr class="auth"/>
                <span>Don’t have an account?</span>&nbsp;<a class="link-auth">Register</a>
            </div>

    </div>
    <div class="popup popup-reg">
        <div class="popup-title">
            Create account
        </div>

        <label for="email">E-mail</label>
        <input id="email" class="input">
        <label for="pass">Password</label>
        <input id="pass" class="input">
        <button class="btn btn-popup">Sign In</button>
        <div class="link-auth">
            <a>Forgot Your Password?</a>
            <hr class="auth"/>
            <span>Don’t have an account?</span>&nbsp;<a class="link-auth">Register</a>
        </div>

    </div>
</body>
</html>
